<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FUSE – Sign In</title>
  <link rel="stylesheet" href="assets/vendor/bootstrap/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/vendor/bootstrap-icons/bootstrap-icons.min.css">
  <style>
    :root { --accent-blue:#4472ca; --accent-teal:#29b6d2; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{min-height:100vh;background:linear-gradient(135deg,#2d3142 0%,#3f4565 100%);display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',system-ui,sans-serif;}
    .login-wrap{width:400px;}
    .login-card{background:#fff;border-radius:10px;padding:38px 34px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
    .login-logo{width:46px;height:46px;background:var(--accent-teal);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:21px;font-weight:800;color:#fff;margin:0 auto 16px;}
    .login-title{text-align:center;font-size:21px;font-weight:700;color:#2d3142;margin-bottom:4px;}
    .login-sub{text-align:center;font-size:12.5px;color:#9098ad;margin-bottom:28px;}
    .field{margin-bottom:16px;}
    .field label{display:block;font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
    .field .input-wrap{position:relative;}
    .field .input-wrap i{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#9098ad;font-size:14px;}
    .field input{width:100%;padding:10px 14px 10px 34px;border:1px solid #e8eaf0;border-radius:5px;font-size:13px;color:#2d3142;outline:none;transition:border-color .15s;}
    .field input:focus{border-color:var(--accent-blue);box-shadow:0 0 0 3px rgba(68,114,202,.12);}
    .remember-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;font-size:12px;}
    .remember-row label{display:flex;align-items:center;gap:6px;color:#6b7280;cursor:pointer;}
    .remember-row input{accent-color:var(--accent-blue);}
    .forgot{color:var(--accent-blue);text-decoration:none;font-weight:600;}
    .btn-login{width:100%;padding:11px;background:var(--accent-blue);color:#fff;border:none;border-radius:5px;font-size:13px;font-weight:700;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:6px;}
    .btn-login:hover{background:#3561b5;}
    .login-footer{text-align:center;margin-top:22px;font-size:12px;color:#9098ad;}
    .login-footer a{color:var(--accent-blue);text-decoration:none;font-weight:600;}
    .alert-error{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;border-radius:5px;padding:10px 14px;font-size:12px;margin-bottom:16px;display:none;}
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">F</div>
    <h1 class="login-title">Welcome back</h1>
    <p class="login-sub">Sign in to your FUSE admin account</p>

    <div class="alert-error" id="loginError">Invalid email or password. Try admin@fuse.io / password</div>

    <form id="loginForm">
      <div class="field">
        <label>Email address</label>
        <div class="input-wrap">
          <i class="bi bi-envelope"></i>
          <input type="email" id="email" placeholder="admin@fuse.io" value="admin@fuse.io">
        </div>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <i class="bi bi-lock"></i>
          <input type="password" id="password" placeholder="••••••••" value="password">
        </div>
      </div>
      <div class="remember-row">
        <label><input type="checkbox" checked> Remember me</label>
        <a href="#" class="forgot">Forgot password?</a>
      </div>
      <button type="submit" class="btn-login">
        <i class="bi bi-box-arrow-in-right"></i> Sign In
      </button>
    </form>

    <p class="login-footer">Don't have an account? <a href="#">Contact your admin</a></p>
  </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const pass  = document.getElementById('password').value;
  if (email === 'admin@fuse.io' && pass === 'password') {
    window.location.href = 'index.html#dashboard';
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
});
</script>
</body>
</html>
